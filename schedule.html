<script>
fetch("session_check.php")
    .then(res => res.json())
    .then(data => {
        if (!data.success) {
            alert(data.error);  
            window.location.href = "hairdresser_login.html";
        }
    })
    .catch(err => console.log(err));

function loadSchedule(){
    fetch("hairdresser_TimeTable.php")
    .then(res => res.text())
    .then(text => {
        console.log("RAW RESPONSE:", text);

        const data = JSON.parse(text);  // 只 parse 一次
        console.log("Parsed JSON:", data);

        if (!data.success) {
            alert("Load schedule failed: " + data.error);
            return;
        }

        const table = document.getElementById("scheduleTable");
        while (table.rows.length > 1) {
            table.deleteRow(1);
        }

        data.schedule.forEach(item => {
            const row = table.insertRow();
            row.insertCell().textContent = item.weekday;
            row.insertCell().textContent = item.work_time;
        });
    })
    .catch(e => console.log("JSON Error:", e));
}
loadSchedule();
</script>

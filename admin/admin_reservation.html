<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin - Manage Reservations</title>
    <link rel="stylesheet" href="styles.css">

    <style>
        .admin-panel {
            max-width: 1200px;
            margin: 20px auto;
        }

        .status-tabs {
            margin: 15px 0;
        }
        .status-tabs button {
            margin-right: 8px;
            padding: 6px 14px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: #e0e0e0;
        }
        .status-tabs button.active {
            background: #007bff;
            color: white;
        }

        .table-wrapper {
            max-height: 420px;
            overflow-y: auto;
            border: 1px solid #ddd;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
            position: sticky;
            top: 0;
            z-index: 2;
        }

        .action-btn {
            padding: 6px 12px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            margin-right: 6px;
        }

        .delete-btn {
            background-color: #dc3545;
            color: white;
        }

        .complete-btn {
            background-color: #28a745;
            color: white;
        }

        .readonly {
            color: #777;
            font-style: italic;
        }
    </style>
</head>

<body>

<header>
    <div class="header-inner">
        <h1>Admin Panel - Reservation Management</h1>
        <nav>
            <ul>
                <li><a href="admin_home.html">Admin Home</a></li>
                <li><a href="#" id="logoutLink">Logout</a></li>
            </ul>
        </nav>
    </div>
</header>

<div class="container admin-panel card-glass">
    <h2>Reservation Management</h2>
    <p id="queryTimeText" style="color:#555; font-size:14px;">
    Query time: loading...
    </p>
    <!-- Status Filtering-->
    <div class="status-tabs">
        <button onclick="filterStatus('all')" class="active">All</button>
        <button onclick="filterStatus('pending')">Pending</button>
        <button onclick="filterStatus('paid')">Paid</button>
        <button onclick="filterStatus('completed')">Completed</button>
        <button onclick="filterStatus('cancelled')">Cancelled</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Customer</th>
                    <th>Hairdresser</th>
                    <th>Service</th>
                    <th>Time</th>
                    <th>Status</th>
                    <th>Amount</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="reservationsBody"></tbody>
        </table>
    </div>
</div>

<script>
let allReservations = [];
let currentStatus = "all";

/* -------- Load Data -------- */
function loadReservations() {
    fetch("admin_get_reservations.php")
        .then(res => res.text())
        .then(text => {
            console.log("RAW:", text);
            const data = JSON.parse(text);
            return data;
        })
        .then(data => {
            if (!data.success) {
                alert("Failed to load reservations.");
                return;
            }
            document.getElementById("queryTimeText").textContent =
            "Query execution time: " + data.queryTime + " seconds";
            allReservations = data.reservations;
            renderTable();
        })
        .catch(err => console.log("LOAD ERROR:", err));
}

/* -------- Filter -------- */
function filterStatus(status) {
    currentStatus = status;
    document.querySelectorAll(".status-tabs button")
        .forEach(b => b.classList.remove("active"));
    event.target.classList.add("active");
    renderTable();
}

/* -------- Render -------- */
function renderTable() {
    const body = document.getElementById("reservationsBody");
    body.innerHTML = "";

    let list = allReservations;
    if (currentStatus !== "all") {
        list = list.filter(r => r.status === currentStatus);
    }

    if (list.length === 0) {
        body.innerHTML =
            `<tr><td colspan="8" style="text-align:center;color:#777;">
                No reservations
             </td></tr>`;
        return;
    }

    list.forEach(r => {
        const tr = document.createElement("tr");

        let actionHTML = "";

        if (r.status === "pending") {
            actionHTML = `
                <button class="action-btn complete-btn"
                        onclick="markCompleted('${r.id}')">
                    Mark Completed
                </button>
                <button class="action-btn delete-btn"
                        onclick="deleteReservation('${r.id}')">
                    Delete
                </button>
            `;
        } else if (r.status === "paid") {
            actionHTML = `<span class="readonly">Read-only</span>`;
        } else {
            actionHTML = `<span class="readonly">Read-only</span>`;
        }

        tr.innerHTML = `
            <td>${r.id}</td>
            <td>${r.customerName || r.customerId}</td>
            <td>${r.hdName || r.hairdresserId || "-"}</td>
            <td>${r.serviceName || r.serviceId}</td>
            <td>${r.timePeriod || "-"}</td>
            <td>${r.status}</td>
            <td>${Number(r.amount || 0).toFixed(2)}</td>
            <td>${actionHTML}</td>
        `;

        body.appendChild(tr);
    });
}

/* -------- Mark Completed -------- */
function markCompleted(id) {
    if (!confirm("Mark this reservation as completed?")) return;

    const form = new FormData();
    form.append("id", id);

    fetch("admin_mark_completed.php", {
        method: "POST",
        body: form
    })
    .then(res => res.text())
    .then(text => {
        console.log("COMPLETE RAW:", text);
        const data = JSON.parse(text);

        if (data.success) {
            loadReservations();
        } else {
            alert("Update failed.");
        }
    })
    .catch(err => console.log("COMPLETE ERROR:", err));
}

/* -------- Delete -------- */
function deleteReservation(id) {
    if (!confirm("⚠ This action cannot be undone. Continue?")) return;

    const form = new FormData();
    form.append("id", id);

    fetch("admin_delete_reservation.php", {
        method: "POST",
        body: form
    })
    .then(res => res.text())
    .then(text => {
        console.log("DELETE RAW:", text);
        const data = JSON.parse(text);

        if (data.success) {
            loadReservations();
        } else {
            alert("Delete failed.");
        }
    })
    .catch(err => console.log("DELETE ERROR:", err));
}

/* -------- Init -------- */
document.getElementById("logoutLink").onclick = () => {
    fetch("admin_logout.php").then(() => location.href = "admin_login.html");
};

window.onload = loadReservations;
</script>

</body>
</html>

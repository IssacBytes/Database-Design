<script>
    function loginCustomer() {
        var name = document.getElementById("loginName").value;
        var pwd = document.getElementById("loginPwd").value;

        check_php_login();
        /*if (name === "user1" && pwd === "123456") {
            alert("Login success!");
            // After successful login, you will enter the "Logged-in Homepage"
            window.location = "index_user.html";
        } else {
            alert("The information entered is incorrect. Please try again.");
        }*/
    }

    function check_php_login(){
        var name = document.getElementById("loginName").value;
        var pwd = document.getElementById("loginPwd").value;

        var formData = new FormData();
        formData.append("loginName", name);
        formData.append("loginPwd", pwd);

        fetch("login.php", {
            method: "POST",
            body: formData
        })
        .then(res => res.text())
        .then(text =>{
            console.log("RAW RESPONSE:",text);

            try{
                const data = JSON.parse(text);
                console.log("Parsed JSON:", data);

                if (!data.success){
                    alert("Login failed: " + data.error);
                } else {
                    alert("Login successful!"+" Welcome, " + data.c_name);
                    window.location = "index_user.html";
                }
            } catch(e){
                alert("JSON Parse Error: " + e);
            }
        })
    }

    function registerCustomer() {
        var name = document.getElementById("regName").value;
        var email = document.getElementById("regEmail").value;
        var phone = document.getElementById("regPhone").value;

        if (!checkEmail(email)) return;

        if (!checkPhoneNumber(phone)) return;


        if (name === "" || email === "") {
            alert("Name and email are required.");
        } else {
            /*alert("Register information has been sent to server (demo).");
            document.getElementById("msg").innerHTML =
                "Customer registered (demo). You can login now.";*/
            check_php_Register();
        }
    }
    function checkEmail(email) {
        const pattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (!pattern.test(email)) {
        alert("Email format invalid.");
        return false;
        }

        alert("Email format OK!");
        return true;
    }

    function checkPhoneNumber(phone){
        const phonePattern = /^\d{11}$/;

        if (!phonePattern.test(phone)) {
        alert("Phone number format invalid.");
        return false;
        }

        alert("Phone number format OK!");
        return true;
    }


    function check_php_Register() {
    var name  = document.getElementById("regName").value;
    var pwd   = document.getElementById("regPwd").value;
    var email = document.getElementById("regEmail").value;
    var phone = document.getElementById("regPhone").value;

    var formData = new FormData();
    formData.append("regName", name);
    formData.append("regPwd", pwd);
    formData.append("regEmail", email);
    formData.append("regPhone", phone);

    fetch("register.php", {
    method: "POST",
    body: formData
    })
    .then(res => res.text())
    .then(text => {
    console.log("RAW RESPONSE:", text);

    try {
        const data = JSON.parse(text);
        console.log("Parsed JSON:", data);

        if (!data.success) {
            alert("Registration failed: " + data.error);
        } else {
            alert("Registration successful!");
        }
    } catch(e) {
        alert("JSON Parse Error: " + e);
    }
    });

}

</script>

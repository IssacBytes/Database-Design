<script>
    function loginHd() {
        var id = document.getElementById("hdId").value;
        var pwd = document.getElementById("hdPwd").value;
        login_php();


        /*if (id === "H001" && pwd === "123456") {

        }*/
    }

    function login_php(){
        var hdId = document.getElementById("hdId").value;
        var hdPwd = document.getElementById("hdPwd").value;
        var formData = new FormData();
        formData.append("hdId", hdId);
        formData.append("hdPwd", hdPwd);

        fetch("login_hairdresser.php", {
            method: "POST",
            body: formData
        })
        .then(res => res.text())
        .then(text =>{
            console.log(text);

            try{
                const data = JSON.parse(text);

                if(!data.success){
                    alert("Login failed: " + data.error);
                } else {
                    alert("Login successful!"+" Welcome, " + data.h_name);
                    window.location.href = data.redirect;
                }
            }
            catch (e){
                console.error("Error parsing JSON:", e);
                alert("An error occurred while processing the response.");
            }
        })
    }
</script>
